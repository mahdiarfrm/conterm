# Conterm bundled defaults. Loaded BEFORE any user config so the
# user's ~/.config/ghostty/config and ~/.config/conterm/config
# still win. This is a clean, neutral default — NOT anyone's
# personal config.
#
# NOTE: this file is a verbatim copy of the default that is also
# compiled into the Conterm binary. If this file is ever missing,
# the app uses the identical embedded copy — it never needs a
# network or any external resource.

# Bar cursor with blink — a block cursor visually sits ON the
# previous character, which confuses people.
cursor-style = bar
cursor-style-blink = true

# Keep cursor-style from being overridden by shells that rewrite
# the cursor shape via escape codes (oh-my-zsh themes, vi-mode).
shell-integration-features = no-cursor

# Let Conterm's glass chrome show through the terminal cells.
background-opacity = 0.78

# Small inner pad so text isn't flush with the rounded corner.
window-padding-x = 6
window-padding-y = 4

# Restore window position/size between launches.
window-save-state = always
